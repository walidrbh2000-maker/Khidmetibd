name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — docker-compose.gpu.yml
#
# Override GPU NVIDIA — à utiliser EN PLUS du docker-compose.yml principal :
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#   make start-gpu
#   khidmeti.bat start-gpu
#   .\khidmeti.ps1 start-gpu
#
# ── Prérequis ─────────────────────────────────────────────────────────────────
#   NVIDIA drivers installés sur l'hôte
#   NVIDIA Container Toolkit :
#     sudo apt install nvidia-container-toolkit
#     sudo systemctl restart docker
#
# ── Modèles recommandés selon le GPU ─────────────────────────────────────────
#    8 GB VRAM  (RTX 3070, 4060 Ti) → gemma4:e2b  (défaut)
#    8 GB VRAM                      → gemma4:e4b  (meilleure qualité)
#   12 GB VRAM  (RTX 3060, 4070)    → gemma4:26b
#   16 GB VRAM+ (RTX 4080, 3090)    → gemma4:31b
#
# ── Changer de modèle GPU ────────────────────────────────────────────────────
#   1. Modifier OLLAMA_MODEL dans .env
#   2. make ollama-pull   (pull avec progression visible)
#   3. make start-gpu
#
# ── Versions ─────────────────────────────────────────────────────────────────
#   Ce fichier override les images CPU par leurs variantes CUDA.
#   Les versions CUDA DOIVENT correspondre aux versions CPU du docker-compose.yml.
#   Ollama CPU  : ollama/ollama:0.6.5
#   Ollama GPU  : ollama/ollama:0.6.5  (même image, supporte CUDA nativement)
#   Whisper CPU : fedirz/faster-whisper-server:0.2.1-cpu
#   Whisper GPU : fedirz/faster-whisper-server:0.2.1-cuda
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Ollama GPU ───────────────────────────────────────────────────────────────
  #
  #  MÊME image que la version CPU — ollama/ollama:0.6.5 supporte nativement
  #  CUDA via le Container Toolkit NVIDIA. Pas besoin d'une image séparée.
  #
  #  Le modèle réside dans le même volume khidmeti-ollama-data.
  #  Aucun re-téléchargement si le modèle est déjà dans le volume.
  #
  #  OLLAMA_NUM_PARALLEL=4   → GPU gère le parallélisme natif (vs 1 sur CPU)
  #  OLLAMA_KEEP_ALIVE=-1    → modèle permanent en VRAM (zéro cold start)
  #  OLLAMA_FLASH_ATTENTION=1 → activé sur GPU (réduit VRAM, améliore vitesse)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.5
    environment:
      OLLAMA_NUM_PARALLEL:        "4"
      OLLAMA_MAX_LOADED_MODELS:   "1"
      OLLAMA_KEEP_ALIVE:          "-1"
      OLLAMA_NUM_THREAD:          "0"
      OLLAMA_FLASH_ATTENTION:     "1"
      NVIDIA_VISIBLE_DEVICES:     "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    # Lever la limite CPU (le GPU gère la mémoire du modèle)
    mem_limit: null
    mem_reservation: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        all
              capabilities: [gpu]

  # ── faster-whisper CUDA ───────────────────────────────────────────────────
  #
  #  Variante CUDA — même version (0.2.1) que le CPU pour cohérence.
  #  float16 sur GPU : qualité maximale, latence réduite de ~4x vs int8 CPU.
  #  WHISPER__BEAM_SIZE=5 → qualité maximale (vs 1 sur CPU pour la vitesse).
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:0.2.1-cuda
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cuda"
      WHISPER__COMPUTE_TYPE:     "float16"
      WHISPER__LANGUAGE:         "auto"
      WHISPER__BEAM_SIZE:        "5"
    mem_limit: null
    mem_reservation: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        1
              capabilities: [gpu]

  # ── Limites mémoire levées sur machine GPU ────────────────────────────────
  #
  #  Sur machine GPU, la RAM système est généralement >= 16 GB.
  #  On lève les limites strictes pour laisser les services respirer.
  #  Les limites VRAM sont gérées par le driver NVIDIA, pas par Docker.
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    mem_limit: null
    mem_reservation: null
    environment:
      NODE_ENV: development
      # GPU machine : plus de RAM disponible → heap V8 plus généreux
      NODE_OPTIONS: "--max-old-space-size=512"

  mongo:
    mem_limit: null
    mem_reservation: null

  redis:
    mem_limit: null
    mem_reservation: null
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  qdrant:
    mem_limit: null
    mem_reservation: null

  minio:
    mem_limit: null
    mem_reservation: null

  mongo-express:
    mem_limit: null
    mem_reservation: null

  nginx:
    mem_limit: null
    mem_reservation: null
