name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — docker-compose.gpu.yml v14.0
#
# Override GPU NVIDIA pour Gemma4 E4B — à utiliser AVEC le compose principal :
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# ── v14 : Whisper supprimé — Gemma4 gère audio nativement ────────────────────
#   Plus de section ai-audio dans cet override.
#   E4B GPU audio : mêmes capacités que E2B, avec x5-10 rapidité sur GPU.
#
# ── Différences E2B (CPU) → E4B (GPU) ────────────────────────────────────────
#   E2B Q4_K_M : 3.46 GB — CPU only — 4-8 tok/s   — 8 GB RAM minimum
#   E4B Q4_K_M : 4.90 GB — GPU+CPU  — 20-60 tok/s — 8 GB VRAM minimum
#
# ── Prérequis ─────────────────────────────────────────────────────────────────
#   NVIDIA drivers + Container Toolkit :
#     sudo apt install nvidia-container-toolkit
#     sudo systemctl restart docker
#   Téléchargement E4B :
#     GEMMA4_VARIANT=e4b make download-gemma4
#
# ── Budget VRAM (RTX 3070/4060 Ti — 8 GB) ────────────────────────────────────
#   E4B Q4_K_M model     : ~4.90 GB
#   mmproj f32 (img+aud) : ~0.50 GB
#   KV cache (ctx 8192)  : ~0.70 GB
#   ─────────────────────────────────
#   Total VRAM           : ~6.1 GB → OK pour 8 GB VRAM
#
# ── Modèles selon le GPU ──────────────────────────────────────────────────────
#    8 GB VRAM (RTX 3070, 4060 Ti, 3060 12G) → E4B Q4_K_M  ← ce fichier
#   16 GB VRAM (RTX 4080, 3090)              → E4B Q8_0
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Gemma4 E4B GPU ───────────────────────────────────────────────────────────
  #
  # PRÉREQUIS : make download-gemma4 GEMMA4_VARIANT=e4b
  #   → docker/models/gemma4/gemma-4-e4b-it-Q4_K_M.gguf    (~4.90 GB)
  #   → docker/models/gemma4/mmproj-gemma-4-e4b-it-f32.gguf (~0.50 GB)
  #                            ↑ f32 = optimal pour audio + image (conformer encoder)
  #
  # LLAMA_ARG_N_GPU_LAYERS: 999 = offloader tous les layers en VRAM
  # LLAMA_ARG_FLASH_ATTN  : activé sur GPU pour KV cache réduit
  # GEMMA4_TIMEOUT_MS     : réduit à 20s sur GPU (audio x5-10 plus rapide)
  # ─────────────────────────────────────────────────────────────────────────────
  ai-gemma4:
    environment:
      LLAMA_ARG_MODEL:        "/models/gemma-4-e4b-it-Q4_K_M.gguf"
      LLAMA_ARG_MMPROJ:       "/models/mmproj-gemma-4-e4b-it-f32.gguf"
      LLAMA_ARG_CTX_SIZE:     "8192"           # Plus de VRAM → contexte plus grand
      LLAMA_ARG_N_GPU_LAYERS: "999"            # Full GPU offload
      LLAMA_ARG_THREADS:      "4"              # CPU threads pour layers non-GPU
      LLAMA_ARG_FLASH_ATTN:   "true"           # Activé sur GPU
      LLAMA_ARG_JINJA:        "true"
      NVIDIA_VISIBLE_DEVICES:     "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    mem_limit: null
    mem_reservation: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        all
              capabilities: [gpu]

  # ── Limites mémoire levées sur machine GPU (RAM >= 16 GB typique) ────────────
  api:
    mem_limit: null
    mem_reservation: null

  mongo:
    mem_limit: null
    mem_reservation: null

  redis:
    mem_limit: null
    mem_reservation: null
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  qdrant:
    mem_limit: null
    mem_reservation: null

  minio:
    mem_limit: null
    mem_reservation: null

  mongo-express:
    mem_limit: null
    mem_reservation: null

  nginx:
    mem_limit: null
    mem_reservation: null
