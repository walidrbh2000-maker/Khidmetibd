# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — docker-compose.gpu.yml
#
# Override pour machine GPU NVIDIA (futur upgrade).
# À utiliser EN PLUS du docker-compose.yml principal :
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#   make start-gpu
#
# ── Prérequis ────────────────────────────────────────────────────────────────
#   NVIDIA drivers installés sur l'hôte
#   NVIDIA Container Toolkit : https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   sudo apt install nvidia-container-toolkit
#   sudo systemctl restart docker
#
# ── Modèles recommandés selon le GPU ────────────────────────────────────────
#   8 GB VRAM  (RTX 3070, 4060 Ti) → gemma4:e2b  + whisper-small  (par défaut)
#   12 GB VRAM (RTX 3060, 4070)    → gemma4:e4b  + whisper-medium
#   16 GB VRAM (RTX 4080, 3090)    → gemma4:26b  + whisper-large-v3
#   24 GB VRAM (RTX 3090, 4090)    → gemma4:31b  + whisper-large-v3
#
# ── Variables .env à modifier pour GPU ──────────────────────────────────────
#   OLLAMA_MODEL=gemma4:e2b          ← CPU 8 GB RAM (par défaut, inchangé)
#   OLLAMA_MODEL=gemma4:e4b          ← GPU 8 GB VRAM
#   OLLAMA_MODEL=gemma4:26b          ← GPU 12 GB VRAM
#   WHISPER_MODEL=Systran/faster-whisper-large-v3  ← GPU
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Ollama avec accélération GPU ────────────────────────────────────────────
  #
  #  OLLAMA_KEEP_ALIVE=-1 :
  #    Sur GPU, le modèle vit en VRAM — libérer la VRAM n'est utile que si
  #    plusieurs modèles doivent coexister. Avec OLLAMA_MAX_LOADED_MODELS=1,
  #    -1 est optimal : modèle toujours chaud, zéro cold start.
  #
  #  OLLAMA_NUM_PARALLEL=4 :
  #    GPU gère le parallélisme natif — augmenter vs CPU (1).
  #
  #  OLLAMA_KEEP_ALIVE passé à -1 pour rester cohérent avec docker-compose.yml :
  #    Le modèle reste en VRAM indéfiniment — pas de coût de reload.
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_NUM_PARALLEL:        "4"
      OLLAMA_MAX_LOADED_MODELS:   "1"
      # Permanent en VRAM — aucun cold start, cohérent avec le mode CPU
      OLLAMA_KEEP_ALIVE:          "-1"
      # Laisser Ollama utiliser tous les cores CPU pour la pré-tokenisation
      OLLAMA_NUM_THREAD:          "0"
      NVIDIA_VISIBLE_DEVICES:     "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    # Supprime la limite mémoire CPU (le modèle vit en VRAM)
    mem_limit: null
    # Accès GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        all
              capabilities: [gpu]

  # ── Ollama Init GPU — pull le modèle GPU ────────────────────────────────────
  #
  #  Override du service cpu pour tirer un modèle plus grand si besoin.
  #  OLLAMA_MODEL doit être mis à jour dans .env selon le GPU disponible :
  #    OLLAMA_MODEL=gemma4:e2b  (8 GB RAM CPU / 8 GB VRAM GPU — défaut)
  #    OLLAMA_MODEL=gemma4:e4b  (8 GB VRAM GPU — meilleure qualité)
  #    OLLAMA_MODEL=gemma4:26b  (12 GB VRAM GPU)
  #    OLLAMA_MODEL=gemma4:31b  (16+ GB VRAM GPU)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama-init:
    environment:
      OLLAMA_HOST: http://ollama:11434

  # ── Ollama Warmup GPU — préchargement en VRAM ──────────────────────────────
  #
  #  Identique au mode CPU — charge le modèle en VRAM avant les vraies requêtes.
  #  Sur GPU, le warmup est encore plus rapide (~1-3s vs ~5-10s sur CPU).
  # ─────────────────────────────────────────────────────────────────────────────
  ollama-warmup:
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}

  # ── faster-whisper avec accélération CUDA ──────────────────────────────────
  #
  #  Image CUDA (vs latest-cpu en mode standard).
  #  float16 (fp16) vs int8 : meilleure précision, même vitesse sur GPU.
  #
  #  Modèles GPU recommandés :
  #    Systran/faster-whisper-medium       → bon équilibre
  #    Systran/faster-whisper-large-v3     → meilleure qualité (Darija/Arabe)
  #
  #  Vitesse large-v3 sur RTX 3070 : ~0.5s pour 10s d'audio
  #  (vs ~4s sur CPU avec small/int8)
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cuda"
      WHISPER__COMPUTE_TYPE:     "float16"
      WHISPER__LANGUAGE:         "auto"
      # beam_size=5 sur GPU : meilleure précision sans coût notable
      WHISPER__BEAM_SIZE:        "5"
    mem_limit: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        1
              capabilities: [gpu]

  # ── API — limites mémoire levées sur machine GPU (typiquement 16-32 GB RAM) ─
  api:
    mem_limit: null

  # ── Services infrastructure — limites levées ─────────────────────────────────
  mongo:
    mem_limit: null
  redis:
    mem_limit: null
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
  qdrant:
    mem_limit: null
  minio:
    mem_limit: null
  mongo-express:
    mem_limit: null
  nginx:
    mem_limit: null
