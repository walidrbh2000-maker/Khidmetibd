# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — docker-compose.gpu.yml
#
# Override GPU NVIDIA — à utiliser EN PLUS du docker-compose.yml principal :
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#   make start-gpu
#
# ── Prérequis ────────────────────────────────────────────────────────────────
#   NVIDIA drivers installés sur l'hôte
#   NVIDIA Container Toolkit :
#     sudo apt install nvidia-container-toolkit
#     sudo systemctl restart docker
#
# ── Modèles recommandés selon le GPU ────────────────────────────────────────
#   8 GB VRAM  (RTX 3070, 4060 Ti) → gemma4:e2b  (défaut)
#   8 GB VRAM                      → gemma4:e4b  (meilleure qualité)
#   12 GB VRAM (RTX 3060, 4070)    → gemma4:26b
#   16 GB VRAM (RTX 4080, 3090)    → gemma4:31b
#
# ── Changer de modèle GPU ───────────────────────────────────────────────────
#   1. Modifier OLLAMA_MODEL dans .env
#   2. Modifier ARG OLLAMA_MODEL dans docker/ollama/Dockerfile
#   3. make ollama-rebuild
#   4. make start-gpu
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Ollama GPU — même image baked, accélération NVIDIA ─────────────────────
  #
  #  L'image contient déjà le modèle (baked at build time).
  #  On ajoute uniquement les capacités GPU ici.
  #
  #  OLLAMA_NUM_PARALLEL=4 : GPU gère le parallélisme natif
  #  OLLAMA_KEEP_ALIVE=-1  : modèle permanent en VRAM
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    environment:
      OLLAMA_MODELS:              /ollama/models
      OLLAMA_NUM_PARALLEL:        "4"
      OLLAMA_MAX_LOADED_MODELS:   "1"
      OLLAMA_KEEP_ALIVE:          "-1"
      OLLAMA_NUM_THREAD:          "0"
      NVIDIA_VISIBLE_DEVICES:     "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    mem_limit: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        all
              capabilities: [gpu]

  # ── faster-whisper CUDA ────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cuda"
      WHISPER__COMPUTE_TYPE:     "float16"
      WHISPER__LANGUAGE:         "auto"
      WHISPER__BEAM_SIZE:        "5"
    mem_limit: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        1
              capabilities: [gpu]

  # ── Limites levées sur machine GPU ────────────────────────────────────────
  api:
    mem_limit: null

  mongo:
    mem_limit: null

  redis:
    mem_limit: null
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  qdrant:
    mem_limit: null

  minio:
    mem_limit: null

  mongo-express:
    mem_limit: null

  nginx:
    mem_limit: null
