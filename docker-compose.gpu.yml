name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — docker-compose.gpu.yml
#
# Override GPU NVIDIA — à utiliser EN PLUS du docker-compose.yml principal :
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#   make start-gpu
#   khidmeti.bat start-gpu
#   .\khidmeti.ps1 start-gpu
#
# ── Prérequis ─────────────────────────────────────────────────────────────────
#   NVIDIA drivers installés sur l'hôte
#   NVIDIA Container Toolkit :
#     sudo apt install nvidia-container-toolkit
#     sudo systemctl restart docker
#
# ── Stratégie dual-model sur GPU ─────────────────────────────────────────────
#   Sur GPU, la VRAM est gérée par le driver NVIDIA.
#   OLLAMA_MAX_LOADED_MODELS=2 → les deux modèles peuvent coexister en VRAM.
#   OLLAMA_KEEP_ALIVE=-1       → modèles permanents en VRAM (zéro cold start).
#   OLLAMA_FLASH_ATTENTION=1   → activé sur GPU (réduit VRAM, améliore vitesse).
#
# ── Modèles recommandés selon le GPU ─────────────────────────────────────────
#    8 GB VRAM  (RTX 3070, 4060 Ti) → gemma3:1b + moondream  ← dual-model v8
#    8 GB VRAM                      → gemma3:4b (si besoin de meilleure qualité)
#   12 GB VRAM  (RTX 3060, 4070)    → gemma3:4b + moondream
#   16 GB VRAM+ (RTX 4080, 3090)    → gemma3:12b + moondream
#
# ── Changer de modèle GPU ────────────────────────────────────────────────────
#   1. Modifier OLLAMA_MODEL et OLLAMA_VISION_MODEL dans .env
#   2. make ollama-pull-all   (pull avec progression visible)
#   3. make start-gpu
#
# ── Versions ─────────────────────────────────────────────────────────────────
#   Ollama CPU  : ollama/ollama:latest
#   Ollama GPU  : ollama/ollama:latest  (même image, supporte CUDA nativement)
#   Whisper CPU : fedirz/faster-whisper-server:latest-cpu
#   Whisper GPU : fedirz/faster-whisper-server:latest-cuda
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Ollama GPU ───────────────────────────────────────────────────────────────
  #
  #  MÊME image que la version CPU — ollama/ollama:latest supporte nativement
  #  CUDA via le Container Toolkit NVIDIA.
  #
  #  OLLAMA_MAX_LOADED_MODELS=2  → dual-model : gemma3:1b + moondream en VRAM
  #  OLLAMA_KEEP_ALIVE=-1        → modèles permanents (zéro cold start GPU)
  #  OLLAMA_FLASH_ATTENTION=1    → activé sur GPU
  #  OLLAMA_NUM_CTX=2048         → contexte plus large possible sur GPU
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_NUM_PARALLEL:        "2"
      OLLAMA_MAX_LOADED_MODELS:   "2"    # GPU : deux modèles en VRAM simultanément
      OLLAMA_KEEP_ALIVE:          "-1"   # Modèles permanents en VRAM
      OLLAMA_NUM_THREAD:          "0"    # Laisser Ollama choisir
      OLLAMA_FLASH_ATTENTION:     "1"    # Activé sur GPU
      OLLAMA_NUM_CTX:             "2048" # Contexte plus large sur GPU
      NVIDIA_VISIBLE_DEVICES:     "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    # Lever les limites CPU (GPU gère sa propre mémoire)
    mem_limit: null
    mem_reservation: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        all
              capabilities: [gpu]

  # ── faster-whisper CUDA ───────────────────────────────────────────────────
  #
  #  float16 sur GPU : qualité maximale, latence ~4x inférieure au CPU int8.
  #  WHISPER__BEAM_SIZE=5 → qualité maximale (vs 1 sur CPU pour la vitesse).
  #  WHISPER__LANGUAGE absent : "auto" cause HTTP 422 (pas ISO 639-1).
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cuda"
      WHISPER__COMPUTE_TYPE:     "float16"
      # WHISPER__LANGUAGE absent intentionnellement — "auto" cause HTTP 422
      WHISPER__BEAM_SIZE:        "5"
    mem_limit: null
    mem_reservation: null
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        1
              capabilities: [gpu]

  # ── Limites mémoire levées sur machine GPU ────────────────────────────────
  #  Sur machine GPU, la RAM système est généralement >= 16 GB.
  #  Les limites strictes sont levées ; VRAM gérée par le driver NVIDIA.
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    mem_limit: null
    mem_reservation: null
    environment:
      NODE_ENV: development
      NODE_OPTIONS: "--max-old-space-size=768"

  mongo:
    mem_limit: null
    mem_reservation: null

  redis:
    mem_limit: null
    mem_reservation: null
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  qdrant:
    mem_limit: null
    mem_reservation: null

  minio:
    mem_limit: null
    mem_reservation: null

  mongo-express:
    mem_limit: null
    mem_reservation: null

  nginx:
    mem_limit: null
    mem_reservation: null
