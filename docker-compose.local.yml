version: '3.9'

# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up
# Requires: 16GB+ RAM, GPU optional (will be slow without GPU)

services:
  api:
    environment:
      AI_PROVIDER: ollama

  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    ports:
      - '11434:11434'
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - khidmeti-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: khidmeti-whisper
    restart: unless-stopped
    environment:
      ASR_MODEL: large-v3
      ASR_ENGINE: openai_whisper
    ports:
      - '9000:9000'
    networks:
      - khidmeti-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama-init
    depends_on:
      - ollama
    networks:
      - khidmeti-network
    entrypoint: >
      /bin/sh -c "
        sleep 10;
        ollama pull gemma4:e2b;
        ollama pull nomic-embed-text;
        echo 'Ollama models ready.';
        exit 0;
      "
    environment:
      OLLAMA_HOST: http://ollama:11434

volumes:
  ollama-models:
