name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose
#
# IA : Gemma-4 via OpenRouter (gratuit) ou Google AI API
#      Basculer via AI_PROVIDER dans .env : gemini | openrouter | ollama | vllm
#
# Stack : NestJS · MongoDB 7 · Redis 7 · Qdrant 1.9 · MinIO · nginx
# Interface MongoDB : Mongo Express → http://localhost:8081  (démarrage auto)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:
    name: khidmeti-mongo-data
  redis-data:
    name: khidmeti-redis-data
  qdrant-data:
    name: khidmeti-qdrant-data
  minio-data:
    name: khidmeti-minio-data

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
    container_name: khidmeti-api
    restart:  unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - khidmeti-network
    labels:
      com.khidmeti.service: "api"
      com.khidmeti.description: "Khidmeti NestJS REST API"

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s
    labels:
      com.khidmeti.service: "database"

  # ── Mongo Express — Interface Web MongoDB (démarrage automatique) ────────────
  #    Accès : http://localhost:8081
  #    Pas de mot de passe requis en développement local
  # ─────────────────────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
      ME_CONFIG_SITE_BASEURL:          "/"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - khidmeti-network
    labels:
      com.khidmeti.service: "mongo-ui"
      com.khidmeti.description: "Interface Web MongoDB — http://localhost:8081"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    healthcheck:
      test:     ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  3s
      retries:  5
    labels:
      com.khidmeti.service: "cache"

  # ── Qdrant v1.9 — Base vectorielle ──────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s
    labels:
      com.khidmeti.service: "vector-db"

  # ── MinIO — Stockage objet (remplace Cloudinary) ────────────────────────────
  #    API S3  : http://localhost:9001
  #    Console : http://localhost:9002
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:latest
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9002"
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s
    labels:
      com.khidmeti.service: "object-storage"

  # ── MinIO Init — Création automatique des buckets ───────────────────────────
  minio-init:
    image:          minio/mc:latest
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        echo '→ Connexion MinIO...';
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        echo '→ Création des buckets...';
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets Khidmeti prêts : profile-images | service-media | audio-recordings';
        exit 0;
      "
    labels:
      com.khidmeti.service: "minio-init"

  # ── nginx — Reverse proxy ───────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    labels:
      com.khidmeti.service: "gateway"
