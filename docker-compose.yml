name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose v14.0
#
# MIGRATION v14 — Gemma4 audio natif : modèle unique pour tout
#   SUPPRIMÉ : ai-audio (faster-whisper-server) — Gemma4 gère l'audio nativement
#
# BASE TECHNIQUE :
#   llama.cpp PR#21421 "mtmd: add Gemma 4 audio conformer encoder support" (MERGÉ)
#   Testé CPU + Vulkan sur E2B et E4B — mmproj f32 inclut l'encodeur audio
#
# AVANTAGES v14 vs v13 :
#   • ~2 GB RAM économisés (Whisper retiré)
#   • 1 seul service IA (ai-gemma4 gère texte + images + audio)
#   • Pipeline audio single-step (audio → JSON intent sans STT intermédiaire)
#   • Pas de téléchargement Whisper au premier lancement
#   • Darija algérienne mieux comprise (Gemma4 = 140+ langues natives)
#
# BUDGET MÉMOIRE v14 (6 GB RAM suffisant, 8 GB recommandé) :
#   ai-gemma4  (Gemma4 E2B Q4_K_M) : ~4.5 GB (model 3.46G + mmproj 0.3G + KV)
#   api + infra                     : ~1.5 GB
#   ─────────────────────────────────────────
#   Total (limits)                  : ~6.0 GB (mmap SSD pour overflow rare)
#
# FORMAT AUDIO (recommandations) :
#   WAV 16kHz mono : optimal (décodage natif llama.cpp)
#   MP3/M4A/OGG   : supportés si libsndfile compilé dans llama.cpp
#   Limite Gemma4  : 30 secondes maximum
#
# SETUP INITIAL (obligatoire avant make start) :
#   1. make download-gemma4   → télécharge model.gguf + mmproj.gguf (~3.8 GB)
#   2. make start
#
# PASSAGE GPU (E4B) :
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:  { name: khidmeti-mongo-data  }
  redis-data:  { name: khidmeti-redis-data  }
  qdrant-data: { name: khidmeti-qdrant-data }
  minio-data:  { name: khidmeti-minio-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:     { condition: service_healthy }
      redis:     { condition: service_healthy }
      qdrant:    { condition: service_healthy }
      minio:     { condition: service_healthy }
      ai-gemma4: { condition: service_healthy }
      # v14 : ai-audio (Whisper) supprimé — Gemma4 gère l'audio nativement
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-GEMMA4 — llama.cpp:server + Gemma4 E2B Q4_K_M
  #
  # v14 : gère désormais texte + images + AUDIO NATIF (PR#21421 mergé)
  #
  # PRÉREQUIS : make download-gemma4
  #   → docker/models/gemma4/gemma-4-e2b-it-Q4_K_M.gguf    (~3.46 GB)
  #   → docker/models/gemma4/mmproj-gemma-4-e2b-it-f32.gguf (~0.3 GB)
  #                            ↑ f32 = optimal pour audio (conformer encoder)
  #
  # LLAMA_ARG_JINJA    : requis pour le chat template Gemma4 (roles system/user)
  # LLAMA_ARG_CTX_SIZE : 4096 pour 8 GB RAM — augmenter si plus de RAM
  # LLAMA_ARG_THREADS  : 4 = bon compromis sur CPU 4+ cœurs
  # LLAMA_ARG_PARALLEL : 2 = 2 requêtes parallèles (texte + audio simultanés)
  #
  # AUDIO NATIF (v14) :
  #   Format API : { type: "input_audio", input_audio: { data: "base64", format: "wav" } }
  #   mmproj f32 : contient encodeur image ET encodeur audio (conformer USM-style)
  #   Limite     : 30 secondes audio maximum par requête
  #   Timeout    : GEMMA4_TIMEOUT_MS=45000 (audio = mel spectrogram sur CPU → plus long)
  # ════════════════════════════════════════════════════════════════════════════
  ai-gemma4:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: khidmeti-ai-gemma4
    restart: unless-stopped
    volumes:
      - ./docker/models/gemma4:/models:rw
    environment:
      LLAMA_ARG_MODEL:         "/models/${GEMMA4_MODEL_FILE:-gemma-4-e2b-it-Q4_K_M.gguf}"
      LLAMA_ARG_MMPROJ:        "/models/${GEMMA4_MMPROJ_FILE:-mmproj-gemma-4-e2b-it-f32.gguf}"
      LLAMA_ARG_HF_TOKEN:      "${HF_TOKEN}"
      LLAMA_ARG_PORT:          "8011"
      LLAMA_ARG_HOST:          "0.0.0.0"
      LLAMA_ARG_CTX_SIZE:      "${GEMMA4_CTX_SIZE:-4096}"
      LLAMA_ARG_N_PREDICT:     "512"
      LLAMA_ARG_THREADS:       "4"
      LLAMA_ARG_PARALLEL:      "2"
      LLAMA_ARG_CONT_BATCHING: "true"
      LLAMA_ARG_FLASH_ATTN:    "true"
      # Requis pour le chat template Gemma4 (roles system/user/assistant)
      LLAMA_ARG_JINJA:         "true"
    ports:
      - "8011:8011"
    networks:
      - khidmeti-network
    mem_limit:       5g
    mem_reservation: 3500m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval:     15s
      timeout:      5s
      retries:      5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ────────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ───────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
