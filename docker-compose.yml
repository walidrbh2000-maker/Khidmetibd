name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# STRATÉGIE OLLAMA — Volume (modèle téléchargé une seule fois) :
#   ✅ Aucun build Docker pour Ollama
#   ✅ Modèle conservé dans le volume khidmeti-ollama-data
#   ✅ docker compose down / up → modèle intact, démarrage instantané
#   ✅ Progression visible en temps réel via : make start / make ollama-pull
#
# WORKFLOW :
#   1ère fois      → make start  (pull ~7 GB avec barre de progression)
#   Fois suivantes → make start  (modèle déjà dans le volume → secondes)
#   Changer modèle → modifier OLLAMA_MODEL dans .env + make ollama-pull
#
# SUPPRIMER le modèle (rare) :
#   docker volume rm khidmeti-ollama-data
#   make start
#
# Budget mémoire 8 GB RAM :
#   Ollama + gemma4:e2b  ~3.0 GB  (KEEP_ALIVE=-1 → permanent en RAM)
#   faster-whisper       ~0.5 GB
#   MongoDB + Redis      ~0.7 GB
#   Qdrant + MinIO       ~0.3 GB
#   nginx + API          ~0.5 GB
#   OS + Docker          ~1.5 GB
#   ─────────────────────────────
#   Total                ~6.5 GB  ✅
#
# GPU :
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
    container_name: khidmeti-api
    restart:  unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy }
      redis:   { condition: service_healthy }
      qdrant:  { condition: service_healthy }
      minio:   { condition: service_healthy }
      ollama:  { condition: service_healthy }
      whisper: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit: 512m

  # ── Ollama — LLM local (modèle dans le volume ollama-data) ──────────────────
  #
  #  Image officielle ollama/ollama:latest — aucun build nécessaire.
  #  Le modèle est téléchargé via `make start` (docker exec ollama pull)
  #  et stocké dans le volume khidmeti-ollama-data.
  #
  #  La progression du téléchargement s'affiche ainsi :
  #    pulling manifest
  #    pulling abc123... ████████░░ 4.1 GB / 7.2 GB  32 MB/s  1m58s
  #    verifying sha256...
  #    success
  #
  #  Paramètres RAM (8 GB) :
  #    OLLAMA_NUM_PARALLEL=1      → 1 requête à la fois (évite OOM)
  #    OLLAMA_MAX_LOADED_MODELS=1 → 1 modèle en RAM max
  #    OLLAMA_KEEP_ALIVE=-1       → modèle permanent (zéro cold start)
  #    OLLAMA_NUM_THREAD=4        → adapter au CPU (nproc --all)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE:        "-1"
      OLLAMA_NUM_THREAD:        "4"
      OLLAMA_FLASH_ATTENTION:   "0"
    ports:
      - '11434:11434'
    networks:
      - khidmeti-network
    mem_limit:       4g
    mem_reservation: 200m
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     10s
      timeout:      5s
      retries:      6
      start_period: 15s

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cpu"
      WHISPER__COMPUTE_TYPE:     "int8"
      WHISPER__LANGUAGE:         "auto"
      WHISPER__BEAM_SIZE:        "1"
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       700m
    mem_reservation: 100m
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     15s
      timeout:      10s
      retries:      5
      start_period: 60s

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit: 512m
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit: 256m

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit: 192m
    healthcheck:
      test:     ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  3s
      retries:  5

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit: 256m
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:latest
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit: 256m
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:latest
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit: 64m
