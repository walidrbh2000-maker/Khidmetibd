name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# STRATÉGIE OLLAMA — Volume (modèle téléchargé une seule fois) :
#   ✅ Aucun build Docker pour Ollama
#   ✅ Modèle conservé dans le volume khidmeti-ollama-data
#   ✅ docker compose down / up → modèle intact, démarrage instantané
#   ✅ Progression visible en temps réel via : make start / make ollama-pull
#
# WORKFLOW :
#   1ère fois      → make start  (pull ~7 GB avec barre de progression)
#   Fois suivantes → make start  (modèle déjà dans le volume → secondes)
#   Changer modèle → modifier OLLAMA_MODEL dans .env + make ollama-pull
#
# VERSIONS ÉPINGLÉES :
#   Toutes les images utilisent des versions fixes (pas de :latest).
#   Raison : un `docker compose pull` avec :latest peut casser la prod
#   si une mise à jour incompatible est publiée.
#   → Mettre à jour manuellement et tester avant de changer une version.
#
# Budget mémoire 8 GB RAM :
#   Ollama + gemma4:e2b  ~3.0 GB  (KEEP_ALIVE=-1 → permanent en RAM)
#   faster-whisper       ~0.5 GB
#   MongoDB + Redis      ~0.7 GB
#   Qdrant + MinIO       ~0.3 GB
#   nginx + API          ~0.5 GB
#   OS + Docker          ~1.5 GB
#   ─────────────────────────────
#   Total                ~6.5 GB  ✅
#
# GPU :
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#   make start-gpu
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        # Version Node épinglée — surchargeable depuis CI :
        # docker compose build --build-arg NODE_VERSION=22.14-alpine3.21
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      # V8 heap limité à 400 MB (conteneur limité à 512 MB)
      # Évite les OOM kills silencieux lors de pics de trafic
      NODE_OPTIONS: "--max-old-space-size=400"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy }
      redis:   { condition: service_healthy }
      qdrant:  { condition: service_healthy }
      minio:   { condition: service_healthy }
      ollama:  { condition: service_healthy }
      whisper: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       512m
    mem_reservation: 128m
    # Limiter la taille des logs Docker (évite de remplir le disque en prod)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama — LLM local ──────────────────────────────────────────────────────
  #
  #  Image officielle épinglée — aucun build nécessaire.
  #  Le modèle est dans le volume khidmeti-ollama-data.
  #  Téléchargement via `make start` (progression visible dans le terminal).
  #
  #  Paramètres RAM (8 GB CPU) :
  #    OLLAMA_NUM_PARALLEL=1      → 1 requête à la fois (évite OOM)
  #    OLLAMA_MAX_LOADED_MODELS=1 → 1 modèle en RAM max
  #    OLLAMA_KEEP_ALIVE=-1       → modèle permanent (zéro cold start)
  #    OLLAMA_NUM_THREAD=4        → adapter à `nproc --all` de la machine
  #
  #  Pour mettre à jour la version :
  #    1. Changer le tag ci-dessous
  #    2. docker compose pull ollama
  #    3. make start (le modèle dans le volume est conservé)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.5
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE:        "-1"
      OLLAMA_NUM_THREAD:        "4"
      OLLAMA_FLASH_ATTENTION:   "0"
    ports:
      - '11434:11434'
    networks:
      - khidmeti-network
    mem_limit:       4g
    mem_reservation: 200m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     10s
      timeout:      5s
      retries:      6
      start_period: 15s

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  #
  #  Le modèle Whisper est téléchargé au 1er démarrage depuis HuggingFace
  #  et mis en cache dans whisper-data → les redémarrages suivants sont instantanés.
  #  start_period=90s : temps nécessaire au 1er téléchargement (~466 MB pour small).
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:0.2.1-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cpu"
      WHISPER__COMPUTE_TYPE:     "int8"
      WHISPER__LANGUAGE:         "auto"
      WHISPER__BEAM_SIZE:        "1"
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       700m
    mem_reservation: 100m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     15s
      timeout:      10s
      retries:      5
      # 90s pour couvrir le 1er téléchargement du modèle Whisper (~466 MB)
      start_period: 90s

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       512m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      # FIX : dans le champ test[], ${REDIS_PASSWORD} n'est pas interpolé
      # par Docker Compose. On utilise CMD-SHELL + $$REDIS_PASSWORD
      # (double $$ → Docker Compose le transforme en $ avant exec).
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval: 10s
      timeout:  3s
      retries:  5

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
