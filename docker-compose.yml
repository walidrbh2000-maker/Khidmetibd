name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose v11.1
#
# FIX v11.1 :
#   1. ai-text     CTX 512 → 1024     (corrige "606 tokens exceeds 512")
#   2. ai-vision   OBLIGATOIRE        (décommenté + ajouté dans depends_on api)
#   3. ai-audio    HF_HUB_OFFLINE=0   (force téléchargement HuggingFace)
#   4. ai-text     N_PREDICT 200→256  (headroom pour JSON complexes)
#
# BUDGET MÉMOIRE avec vision obligatoire (RAM 10+ GB recommandée) :
#   ai-text  (Qwen3 Q4_K_M)   :  900 MB
#   ai-vision (moondream2)    : 2200 MB
#   ai-audio (whisper turbo)  : 2000 MB
#   api + infra               : 3000 MB
#   ─────────────────────────────────
#   Total                     : ~8.1 GB → recommandé 10+ GB RAM
#
# Si votre machine a 8 GB, commentez ai-vision et son depends_on dans api.
# Téléchargement auto des modèles : make start (ou make models)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:  { name: khidmeti-mongo-data  }
  redis-data:  { name: khidmeti-redis-data  }
  qdrant-data: { name: khidmeti-qdrant-data }
  minio-data:  { name: khidmeti-minio-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:      { condition: service_healthy }
      redis:      { condition: service_healthy }
      qdrant:     { condition: service_healthy }
      minio:      { condition: service_healthy }
      ai-text:    { condition: service_healthy }
      ai-audio:   { condition: service_started }
      ai-vision:  { condition: service_healthy }   # FIX v11.1 — vision obligatoire
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-TEXT — llama.cpp:server + Qwen3-0.6B-Q4_K_M
  #
  # FIX v11.1 :
  #   LLAMA_ARG_CTX_SIZE  : 512 → 1024
  #   CAUSE  : system prompt few-shot (~500 tokens) + user (~100) = ~606 > 512
  #   IMPACT MÉMOIRE : +~50 MB KV cache (620 MB total, mem_limit 900m inchangé)
  #
  #   LLAMA_ARG_N_PREDICT : 200 → 256
  #   RAISON : headroom pour JSON structurés avec champs optionnels longs
  # ════════════════════════════════════════════════════════════════════════════
  ai-text:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: khidmeti-ai-text
    restart: unless-stopped
    volumes:
      - ./docker/models/text:/models:ro
    environment:
      LLAMA_ARG_MODEL:         /models/qwen3-0.6b-q4_k_m.gguf
      LLAMA_ARG_PORT:          "8011"
      LLAMA_ARG_HOST:          "0.0.0.0"
      LLAMA_ARG_CTX_SIZE:      "1024"   # FIX v11.1 : 512→1024
      LLAMA_ARG_N_PREDICT:     "256"    # FIX v11.1 : 200→256
      LLAMA_ARG_THREADS:       "4"
      LLAMA_ARG_PARALLEL:      "2"
      LLAMA_ARG_CONT_BATCHING: "true"
    ports:
      - "8011:8011"
    networks:
      - khidmeti-network
    mem_limit:       900m
    mem_reservation: 600m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval:     15s
      timeout:      5s
      retries:      5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-AUDIO — faster-whisper-server + large-v3-turbo INT8
  #
  # FIX v11.1 :
  #   HF_HUB_OFFLINE=0             : force le téléchargement même si variable
  #                                   héritée forçait le mode offline
  #   HUGGINGFACE_HUB_VERBOSITY=info : logs de progression du téléchargement
  #
  # Si le téléchargement échoue (restrictions réseau Codespaces) :
  #   make download-whisper        → télécharge depuis l'hôte (toujours connecté)
  #   make restart
  # ════════════════════════════════════════════════════════════════════════════
  ai-audio:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-ai-audio
    restart: unless-stopped
    volumes:
      - ./docker/models/audio:/root/.cache/huggingface:rw
    environment:
      WHISPER__MODEL:                   "${WHISPER_MODEL:-Systran/faster-whisper-large-v3-turbo}"
      WHISPER__INFERENCE_DEVICE:        "cpu"
      WHISPER__COMPUTE_TYPE:            "int8"
      WHISPER__LANGUAGE:                "fr"
      WHISPER__BEAM_SIZE:               "1"
      WHISPER__MAX_CONCURRENT_REQUESTS: "1"
      HF_HUB_OFFLINE:                   "0"          # FIX v11.1
      HUGGINGFACE_HUB_VERBOSITY:        "info"        # FIX v11.1
    ports:
      - "8000:8000"
    networks:
      - khidmeti-network
    mem_limit:       2g
    mem_reservation: 800m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval:     20s
      timeout:      10s
      retries:      5
      start_period: 300s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-VISION — llama.cpp:server + moondream2 (OBLIGATOIRE depuis v11.1)
  #
  # FIX v11.1 : rendu obligatoire (décommenté + dans depends_on api)
  #
  # Modèles téléchargés automatiquement par `make start` :
  #   docker/models/vision/moondream2-text-Q8_0.gguf   (~1.7 GB)
  #   docker/models/vision/moondream2-mmproj-f16.gguf  (~100 MB)
  #
  # Pipeline two-step (inchangé depuis v10) :
  #   Step 1 : moondream2 décrit l'image → description anglais
  #   Step 2 : Qwen3 (ai-text) extrait le JSON d'intent
  #
  # ⚠️  RAM : si votre machine a ≤ 8 GB, commentez ce service et
  #     décommentez `ai-vision` dans depends_on du service api.
  # ════════════════════════════════════════════════════════════════════════════
  ai-vision:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: khidmeti-ai-vision
    restart: unless-stopped
    volumes:
      - ./docker/models/vision:/models:ro
    environment:
      LLAMA_ARG_MODEL:     /models/moondream2-text-Q8_0.gguf
      LLAMA_ARG_MMPROJ:    /models/moondream2-mmproj-f16.gguf
      LLAMA_ARG_PORT:      "8012"
      LLAMA_ARG_HOST:      "0.0.0.0"
      LLAMA_ARG_CTX_SIZE:  "1024"
      LLAMA_ARG_N_PREDICT: "100"
      LLAMA_ARG_THREADS:   "4"
    ports:
      - "8012:8012"
    networks:
      - khidmeti-network
    mem_limit:       2200m
    mem_reservation: 1500m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8012/health"]
      interval:     20s
      timeout:      10s
      retries:      3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ────────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ───────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
