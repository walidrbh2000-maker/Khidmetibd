version: '3.9'

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose
#
# AI: Gemma-4 via Google AI API (aucun conteneur AI local requis)
#     Demo:  gemma-4-31b-it via GEMINI_API_KEY
#     Prod:  remplacer par votre serveur Ollama/vLLM — aucun changement de code
#
# Stack: NestJS · MongoDB · Redis · Qdrant · MinIO · nginx
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  qdrant-data:
  minio-data:

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
    container_name: khidmeti-api
    restart:  unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - khidmeti-network

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    healthcheck:
      test:     ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  3s
      retries:  5

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:latest
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:latest
    container_name: khidmeti-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo 'MinIO buckets prêts.';
        exit 0;
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network

  # ── Mongo Express (dev uniquement) ──────────────────────────────────────────
  mongo-express:
    image:          mongo-express:latest
    container_name: khidmeti-mongo-express
    restart:        unless-stopped
    profiles:       ['dev-tools']
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             'false'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - khidmeti-network
