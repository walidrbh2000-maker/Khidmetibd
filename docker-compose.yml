name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# FIXES v3 (gemma4:e2b + 8 GB RAM) :
#   ✅ Ollama : ollama/ollama:latest forcé via `make start`
#   ✅ API → Ollama : dépendance relaxée à service_started
#   ✅ Ollama healthcheck : start_period 15s → 90s
#   ✅ DNS explicite sur le container Ollama (8.8.8.8 / 1.1.1.1)
#   ✅ OLLAMA_NUM_CTX=4096
#
# FIXES v4 (Codespace 4-core 16 GB RAM / 32 GB disque) :
#   ✅ MinIO mem_limit : 192m → 512m
#   ✅ Modèle : gemma4:e2b → gemma3:4b
#
# FIXES v5 :
#   ✅ API mem_limit : 512m → 1g
#   ✅ NODE_OPTIONS : --max-old-space-size=400 → --max-old-space-size=768
#
# FIXES v6 :
#   ✅ Ollama mem_limit : 4g → 6g
#   ✅ Ollama mem_reservation : 500m → 2g
#   ✅ OLLAMA_NUM_CTX : 4096 → 2048
#
# FIXES v7 (OOM kill + runner crash + whisper 137) :
#   ✅ Ollama mem_limit : 6g → 8g
#   ✅ Ollama mem_reservation : 2g → 5g
#   ✅ Whisper mem_limit : 700m → 1200m
#   ✅ Whisper mem_reservation : 100m → 300m
#
# FIXES v8 — DUAL-MODEL (gemma3:1b + moondream) :
#
#   PROBLÈME : gemma3:4b = ~6.5 GB RAM au pic d'inférence → OOM kill systématique.
#
#   SOLUTION : deux modèles spécialisés ultra-légers :
#     gemma3:1b  → JSON extraction Darija/Arabe/Français → ~1.2 GB
#     moondream  → analyse d'images sinistres (edge vision) → ~1.5 GB
#   OLLAMA_MAX_LOADED_MODELS=1 → swap automatique, un seul modèle en RAM.
#
#   ✅ Ollama mem_limit : 8g → 3g   (pic réel 1.5 GB + marge 1.5 GB)
#   ✅ Ollama mem_reservation : 5g → 1g
#   ✅ OLLAMA_KEEP_ALIVE : -1 → 5m  (libère RAM après 5 min d'inactivité)
#   ✅ OLLAMA_NUM_CTX : 2048 → 1024 (gemma3:1b — texte seul, 1024 suffisant)
#
# BUDGET MÉMOIRE 16 GB RAM (Codespace 4-core) — v8 :
#   Ollama + modèle actif (max)  ~2.0 GB  (moondream ~1.5 GB)
#   faster-whisper-small         ~0.9 GB
#   NestJS API                   ~0.8 GB
#   MongoDB                      ~0.4 GB
#   Redis                        ~0.2 GB
#   Qdrant                       ~0.2 GB
#   MinIO                        ~0.5 GB
#   nginx + mongo-express        ~0.3 GB
#   ─────────────────────────────
#   Conteneurs total             ~5.3 GB
#   OS + Docker daemon           ~1.5 GB
#   ─────────────────────────────
#   TOTAL                        ~6.8 GB  ✅ (marge 9.2 GB sur 16 GB)
#
# WORKFLOW :
#   1ère fois      → make start && make ollama-pull-all
#   Fois suivantes → make start  (modèles en volume → secondes)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy  }
      redis:   { condition: service_healthy  }
      qdrant:  { condition: service_healthy  }
      minio:   { condition: service_healthy  }
      ollama:  { condition: service_started  }
      whisper: { condition: service_started  }
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama — Dual-model local (gemma3:1b + moondream) ────────────────────────
  #
  # FIX v8 — mem_limit 8g → 3g :
  #   Stratégie dual-model : un seul modèle chargé à la fois via
  #   OLLAMA_MAX_LOADED_MODELS=1. Pic réel max = 1.5 GB (moondream).
  #   3g = 1.5 GB pic + 1.5 GB marge (swap buffer, OS overhead).
  #
  # FIX v8 — OLLAMA_KEEP_ALIVE 5m :
  #   Libère la RAM du modèle après 5 minutes d'inactivité.
  #   Permet à l'OS de récupérer la mémoire entre les requêtes.
  #
  # FIX v8 — OLLAMA_NUM_CTX 1024 :
  #   gemma3:1b n'a besoin que de 1024 tokens pour l'extraction JSON.
  #   KV cache ~64 MiB (vs 254 MiB pour 2048). moondream utilise
  #   OLLAMA_VISION_NUM_CTX=2048 passé par l'API par requête.
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"    # CPU : 1 seule inférence à la fois
      OLLAMA_MAX_LOADED_MODELS: "1"    # FIX v8 : swap entre gemma3:1b et moondream
      OLLAMA_KEEP_ALIVE:        "5m"   # FIX v8 : libère RAM après 5 min d'inactivité
      OLLAMA_NUM_THREAD:        "4"    # Threads CPU (4-core Codespace)
      OLLAMA_FLASH_ATTENTION:   "0"    # Désactivé sur CPU
      OLLAMA_NUM_CTX:           "1024" # FIX v8 : gemma3:1b — KV cache ~64 MiB
      OLLAMA_MAX_QUEUE:         "2"    # File d'attente limitée
      OLLAMA_ORIGINS:           "*"    # Connexions Docker inter-services
    ports:
      - '11434:11434'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - khidmeti-network
    mem_limit:       3g              # FIX v8 : 8g→3g — dual-model pic max 1.5 GB
    mem_reservation: 1g              # FIX v8 : 5g→1g — usage réel modèle actif
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     15s
      timeout:      5s
      retries:      8
      start_period: 90s

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  #
  # mem_limit 1200m maintenu depuis v7 (exit code 137 = OOM kill).
  # NOTE — WHISPER__LANGUAGE absent : "auto" cause HTTP 422 (pas ISO 639-1).
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cpu"
      WHISPER__COMPUTE_TYPE:     "int8"
      # WHISPER__LANGUAGE absent intentionnellement — "auto" cause des erreurs 422
      WHISPER__BEAM_SIZE:        "1"
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       1200m
    mem_reservation: 300m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     20s
      timeout:      10s
      retries:      10
      start_period: 300s

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       200m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       512m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
