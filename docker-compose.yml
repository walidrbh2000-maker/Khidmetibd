name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# FIXES v9 — Optimisation 8 GB RAM :
#
#   PROBLÈME : Sur Codespace 8 GB, moondream (vision) timeout systématiquement.
#     moondream cold-start (11s) + CLIP encode (~35s) + génération (~15s)
#     = ~61s > OLLAMA_TIMEOUT_MS=60000 → AbortError → circuit breaker s'ouvre
#     → audio et texte également bloqués (circuit partagé = bug v7/v8)
#
#   FIXES dans le code (local.strategy.ts + intent-extractor.service.ts) :
#     1. OLLAMA_VISION_TIMEOUT_MS=150000 — timeout vision 2.5 min
#     2. Fix bug AbortError (wrappé avant vérification name === 'AbortError')
#     3. Circuit breakers par modalité (image/audio/text indépendants)
#
#   FIXES docker-compose v9 :
#     ✅ Réduction mémoire non-IA pour libérer plus de RAM à Ollama/Whisper
#        sur 8 GB (MongoDB 384m→256m, Qdrant 192m→128m, MinIO 512m→384m,
#        mongo-express 200m→128m)
#
# BUDGET MÉMOIRE 8 GB RAM (Codespace 4-core) — v9 :
#   Ollama + modèle actif (max moondream) :  ~2.0 GB
#   faster-whisper-small                  :  ~0.9 GB
#   NestJS API                            :  ~0.8 GB
#   MongoDB                               :  ~0.3 GB  (↓ 256m)
#   Redis                                 :  ~0.2 GB
#   Qdrant                                :  ~0.1 GB  (↓ 128m)
#   MinIO                                 :  ~0.4 GB  (↓ 384m)
#   nginx + mongo-express                 :  ~0.2 GB  (↓ 128m)
#   ─────────────────────────────────────
#   Conteneurs total                      :  ~4.9 GB
#   OS + Docker daemon                    :  ~1.5 GB
#   ─────────────────────────────────────
#   TOTAL                                 :  ~6.4 GB  ✅ (marge 1.6 GB sur 8 GB)
#   Ollama headroom pour CLIP inference   :  ~1.6 GB  ✅
#
# BUDGET MÉMOIRE 16 GB RAM — v9 (inchangé) :
#   Même configuration — marge ~9 GB
#
# WORKFLOW :
#   1ère fois :  make start && make ollama-pull-all
#   Suivantes :  make start  (modèles en volume)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy  }
      redis:   { condition: service_healthy  }
      qdrant:  { condition: service_healthy  }
      minio:   { condition: service_healthy  }
      ollama:  { condition: service_started  }
      whisper: { condition: service_started  }
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama — Dual-model local (gemma3:1b + moondream) ────────────────────────
  #
  # v9 — mem_limit maintenu à 3g :
  #   moondream peak : ~1.5 GB model + ~0.5 GB CLIP compute buffers = ~2 GB.
  #   3g = 2 GB peak + 1 GB marge ✅
  #
  # v9 — OLLAMA_KEEP_ALIVE 5m :
  #   Sur 8 GB RAM, libérer le modèle après 5 min est important pour laisser
  #   de la RAM aux autres services entre les requêtes.
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"    # CPU : 1 inférence à la fois
      OLLAMA_MAX_LOADED_MODELS: "1"    # swap entre gemma3:1b et moondream
      OLLAMA_KEEP_ALIVE:        "5m"   # libère RAM après 5 min d'inactivité
      OLLAMA_NUM_THREAD:        "4"    # threads CPU (4-core Codespace)
      OLLAMA_FLASH_ATTENTION:   "0"    # désactivé sur CPU
      OLLAMA_NUM_CTX:           "1024" # gemma3:1b — KV cache ~64 MiB
      OLLAMA_MAX_QUEUE:         "2"    # file d'attente limitée
      OLLAMA_ORIGINS:           "*"    # connexions Docker inter-services
    ports:
      - '11434:11434'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - khidmeti-network
    mem_limit:       3g
    mem_reservation: 1g
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     15s
      timeout:      5s
      retries:      8
      start_period: 90s

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  #
  # mem_limit 1200m maintenu :
  #   faster-whisper-small réel : ~900 MB. 1200m laisse 300 MB de marge.
  #   NOTE : WHISPER__LANGUAGE absent intentionnellement — 'auto' cause HTTP 422.
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cpu"
      WHISPER__COMPUTE_TYPE:     "int8"
      # WHISPER__LANGUAGE absent intentionnellement — "auto" cause HTTP 422
      WHISPER__BEAM_SIZE:        "1"
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       1200m
    mem_reservation: 300m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     20s
      timeout:      10s
      retries:      10
      start_period: 300s

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  #
  # v9 — mem_limit 384m → 256m :
  #   Sur 8 GB RAM, MongoDB n'a besoin que de ~200-250 MB pour Khidmeti.
  #   Économie : 128 MB libérés pour Ollama.
  # ─────────────────────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       256m        # v9 : 384m→256m (économie 128m pour Ollama)
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  #
  # v9 — mem_limit 200m → 128m : outil de dev, pas critique sur 8 GB.
  # ─────────────────────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       128m        # v9 : 200m→128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  #
  # v9 — mem_limit 192m → 128m : Qdrant idle sur 8 GB est très léger (~80 MB).
  # ─────────────────────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       128m        # v9 : 192m→128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  #
  # v9 — mem_limit 512m → 384m : MinIO idle ~300 MB. Économie 128m.
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       384m        # v9 : 512m→384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
