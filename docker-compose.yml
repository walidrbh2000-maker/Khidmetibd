name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose v14.1
#
# CORRECTIFS v14.1 (audio Gemma4 natif sur CPU 8 GB RAM) :
#
#   1. pull_policy: always → force le pull de la dernière image ghcr.io/ggml-org/llama.cpp:server
#      qui contient PR#21421 (Gemma4 audio conformer encoder).
#      Sans ça, Docker utilise le cache local (ancienne image sans audio).
#
#   2. LLAMA_ARG_PARALLEL: "2" → "1"
#      Sur 8 GB RAM : model(3.46G) + mmproj-bf16(1G) + KV×2(0.7G) = 5.16G
#      → KV×1(0.35G) = 4.81G  →  marge RAM : ~3.2G ✅ (infra + OS)
#      2 requêtes parallèles audio sur CPU = risque d'OOM sur 8 GB.
#
#   3. LLAMA_ARG_FLASH_ATTN supprimé
#      Flash Attention n'est pas supporté sur CPU (backend GGML CPU only).
#      L'option était ignorée silencieusement mais peut générer un warning
#      et perturber l'initialisation du mmproj audio.
#
#   4. mem_limit: 5g → 5500m + start_period: 60s → 120s
#      mmproj BF16 (~1 GB) prend plus de temps à charger que mmproj f32.
#      start_period plus long évite les faux healthcheck failures au démarrage.
#
# BUDGET MÉMOIRE v14.1 (8 GB RAM) :
#   ai-gemma4 : model(3.46G) + mmproj-bf16(1G) + KV-4096×1(0.35G) = ~4.81 GB
#   api        : 1g  (NestJS + Node.js)
#   infra      : ~0.7 GB (mongo 256m + redis 192m + qdrant 128m + minio 256m + nginx 64m)
#   OS + Docker: ~0.5 GB
#   ──────────────────────────────────────────────────────
#   Total      : ~7.0 GB  →  marge ~1.0 GB ✅
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:  { name: khidmeti-mongo-data  }
  redis-data:  { name: khidmeti-redis-data  }
  qdrant-data: { name: khidmeti-qdrant-data }
  minio-data:  { name: khidmeti-minio-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:     { condition: service_healthy }
      redis:     { condition: service_healthy }
      qdrant:    { condition: service_healthy }
      minio:     { condition: service_healthy }
      ai-gemma4: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-GEMMA4 — llama.cpp:server + Gemma4 E2B Q4_K_M
  #
  # v14.1 : correctifs pour audio natif sur CPU 8 GB RAM
  #
  # PRÉREQUIS : make download-gemma4  (télécharge model + mmproj BF16)
  #   → docker/models/gemma4/google_gemma-4-e2b-it-Q4_K_M.gguf    (~3.46 GB)
  #   → docker/models/gemma4/mmproj-google_gemma-4-e2b-it-bf16.gguf (~1.00 GB)
  #                            ↑ BF16 obligatoire pour l'encodeur audio (PR#21421)
  #
  # pull_policy: always
  #   → Garantit que la dernière image est utilisée à chaque `make start`.
  #   → Image `:server` = rebuild à chaque commit master de llama.cpp.
  #   → Sans pull_policy, Docker utilise le cache local (ancienne image sans audio).
  #
  # LLAMA_ARG_PARALLEL: "1"
  #   → 1 seule requête parallèle sur CPU 8 GB.
  #   → Réduit le KV cache de 0.7 GB (×2) à 0.35 GB (×1).
  #   → Les requêtes audio sont longues sur CPU — le parallélisme n'aide pas.
  #
  # LLAMA_ARG_FLASH_ATTN supprimé
  #   → Flash Attention = GPU uniquement (CUDA/Metal/Vulkan).
  #   → Sur CPU : non supporté, warning au démarrage, peut perturber mmproj init.
  #
  # FORMAT AUDIO ATTENDU (OpenAI-compatible mtmd) :
  #   { type: "input_audio", input_audio: { data: "<base64>", format: "wav" } }
  #   WAV 16kHz mono recommandé — max 30 secondes (~5 MB)
  # ════════════════════════════════════════════════════════════════════════════
  ai-gemma4:
    image: ghcr.io/ggml-org/llama.cpp:server
    # Force le pull de la dernière image à chaque démarrage.
    # Garantit que PR#21421 (Gemma4 audio) est inclus.
    pull_policy: always
    container_name: khidmeti-ai-gemma4
    restart: unless-stopped
    volumes:
      - ./docker/models/gemma4:/models:rw
    environment:
      LLAMA_ARG_MODEL:         "/models/${GEMMA4_MODEL_FILE:-google_gemma-4-e2b-it-Q4_K_M.gguf}"
      LLAMA_ARG_MMPROJ:        "/models/${GEMMA4_MMPROJ_FILE:-mmproj-google_gemma-4-e2b-it-bf16.gguf}"
      LLAMA_ARG_HF_TOKEN:      "${HF_TOKEN}"
      LLAMA_ARG_PORT:          "8011"
      LLAMA_ARG_HOST:          "0.0.0.0"
      LLAMA_ARG_CTX_SIZE:      "${GEMMA4_CTX_SIZE:-4096}"
      LLAMA_ARG_N_PREDICT:     "512"
      LLAMA_ARG_THREADS:       "4"
      # v14.1 : 2 → 1 (8 GB RAM — économise ~0.35 GB de KV cache)
      LLAMA_ARG_PARALLEL:      "1"
      LLAMA_ARG_CONT_BATCHING: "true"
      # v14.1 : LLAMA_ARG_FLASH_ATTN supprimé (CPU only — non supporté)
      # Requis pour le chat template Gemma4 (roles system/user/assistant)
      LLAMA_ARG_JINJA:         "true"
    ports:
      - "8011:8011"
    networks:
      - khidmeti-network
    # v14.1 : 5g → 5500m (model 3.46G + mmproj-bf16 1G + KV 0.35G + overhead)
    mem_limit:       5500m
    mem_reservation: 4500m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval:     20s
      timeout:      10s
      retries:      6
      # v14.1 : 60s → 120s (mmproj BF16 ~1 GB est plus lent à charger que f32)
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ────────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ───────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
