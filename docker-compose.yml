name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# FIXES v10 — Three-bug patch :
#
# ┌─────────────────────────┬──────────────────────────────────────┬──────────────────────────────────────┐
# │ Bug                     │ Root Cause                           │ Fix ici                              │
# ├─────────────────────────┼──────────────────────────────────────┼──────────────────────────────────────┤
# │ Whisper OOM crash       │ ctranslate2 memory leak + 1200m cap  │ mem_limit: 2g (↑ 800m)               │
# │ Whisper bad language    │ faster-whisper-small bad on Darija   │ WHISPER__LANGUAGE=fr                 │
# │ Whisper concurrent OOM  │ parallel requests before prev freed  │ WHISPER__MAX_CONCURRENT_REQUESTS=1   │
# │ Text needs 4+ attempts  │ OLLAMA_MAX_LOADED_MODELS=1 = swap    │ OLLAMA_MAX_LOADED_MODELS=2           │
# └─────────────────────────┴──────────────────────────────────────┴──────────────────────────────────────┘
#
# NOTE — Image fix (Two-Step Pipeline) is in local.strategy.ts, not here.
#        moondream now only describes; gemma3:1b extracts JSON.
#
# BUDGET MÉMOIRE 8 GB RAM — v10 :
#   Ollama (gemma3:1b ~1.2GB + moondream ~1.5GB coexistent) :  ≤ 3.0 GB (mem_limit)
#   faster-whisper-small (+ ctranslate2 leak headroom)       :  ≤ 2.0 GB (↑)
#   NestJS API                                               :  ≤ 1.0 GB
#   MongoDB                                                  :  ≤ 0.3 GB
#   Redis                                                    :  ≤ 0.2 GB
#   Qdrant                                                   :  ≤ 0.1 GB
#   MinIO                                                    :  ≤ 0.4 GB
#   nginx + mongo-express                                    :  ≤ 0.2 GB
#   ─────────────────────────────────────────────────────────────────────
#   Conteneurs total                                         :  ≈ 7.2 GB
#   OS + Docker daemon                                       :  ≈ 1.5 GB
#   ─────────────────────────────────────────────────────────────────────
#   RISQUE : sur 8 GB cela est juste. Si OOM-killer se déclenche,
#   réduire whisper mem_limit à 1600m et Ollama à 2500m.
#   Sur 16 GB RAM : aucun problème.
#
# BUDGET MÉMOIRE 16 GB RAM — v10 :
#   Même configuration — marge ≈ 8 GB.
#
# WORKFLOW :
#   1ère fois :  make start && make ollama-pull-all
#   Suivantes :  make start  (modèles en volume)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy  }
      redis:   { condition: service_healthy  }
      qdrant:  { condition: service_healthy  }
      minio:   { condition: service_healthy  }
      ollama:  { condition: service_started  }
      whisper: { condition: service_started  }
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama — Dual-model local (gemma3:1b + moondream) ────────────────────────
  #
  # FIX v10 — OLLAMA_MAX_LOADED_MODELS: "1" → "2"
  #
  #   PROBLÈME (v8/v9) :
  #     OLLAMA_MAX_LOADED_MODELS=1 : Ollama garde UN seul modèle en RAM.
  #     Workflow texte après une image :
  #       1. moondream est en RAM (depuis le two-step image)
  #       2. requête texte → Ollama doit éjecter moondream, charger gemma3:1b
  #       3. swap ≈ 10-15s → l'utilisateur attend à chaque fois
  #     Avec le cache Redis (intent-extractor), les requêtes identiques sont
  #     servies instantanément, mais le premier appel souffre toujours du swap.
  #
  #   FIX : OLLAMA_MAX_LOADED_MODELS=2
  #     gemma3:1b (~1.2 GB) + moondream (~1.5 GB) = ~2.7 GB
  #     mem_limit ollama = 3g → marge 300 MB ✅
  #     Sur 8 GB RAM : 2.7 GB modèles + 4.5 GB autres services ≈ 7.2 GB total.
  #     Sur 16 GB RAM : aucun problème.
  #
  #   OLLAMA_KEEP_ALIVE=-1 :
  #     Avec OLLAMA_MAX_LOADED_MODELS=2, les deux modèles restent en RAM
  #     indéfiniment. Sur 8 GB, -1 est risqué si d'autres services grossissent.
  #     5m (libère après 5 min) est plus sûr sur 8 GB.
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"    # CPU : 1 inférence à la fois
      OLLAMA_MAX_LOADED_MODELS: "2"    # FIX v10 : 1→2 — gemma3:1b + moondream simultanés
      OLLAMA_KEEP_ALIVE:        "5m"   # libère RAM après 5 min d'inactivité (safe sur 8 GB)
      OLLAMA_NUM_THREAD:        "4"    # threads CPU (4-core Codespace)
      OLLAMA_FLASH_ATTENTION:   "0"    # désactivé sur CPU
      OLLAMA_NUM_CTX:           "1024" # gemma3:1b — KV cache ~64 MiB
      OLLAMA_MAX_QUEUE:         "2"    # file d'attente limitée
      OLLAMA_ORIGINS:           "*"    # connexions Docker inter-services
    ports:
      - '11434:11434'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - khidmeti-network
    mem_limit:       3g     # gemma3:1b 1.2GB + moondream 1.5GB + headroom 300MB
    mem_reservation: 1g
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     15s
      timeout:      5s
      retries:      8
      start_period: 90s

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  #
  # FIX v10 — mem_limit: 1200m → 2g
  #
  #   PROBLÈME :
  #     ctranslate2 (bibliothèque sous-jacente de faster-whisper) souffre d'un
  #     memory leak connu : même après la transcription et la libération du
  #     modèle + GC, la consommation mémoire reste élevée.
  #     Avec mem_limit=1200m, le kernel OOM-killer tue le processus après
  #     quelques requêtes → "khidmeti-whisper exited with code 1" → restart.
  #     Pendant le restart (~5s), toutes les requêtes audio échouent avec
  #     "whisper fetch failed: fetch failed".
  #
  #   FIX : mem_limit=2g
  #     faster-whisper-small réel : ~900 MB.
  #     ctranslate2 leak peak     : ~500 MB supplémentaires.
  #     2g = 900 MB + 500 MB + 600 MB marge ✅
  #
  # FIX v10 — WHISPER__LANGUAGE=fr
  #
  #   PROBLÈME :
  #     Sans langue forcée, faster-whisper-small tente une auto-détection.
  #     La Darija algérienne (arabe dialectal fortement influencé par le français)
  #     est mal couverte par faster-whisper-small et est souvent confondue avec
  #     le turc, le persan ou d'autres langues à 20-30% de confiance seulement.
  #     Résultat : transcriptions fausses → intents incorrects.
  #
  #   FIX : WHISPER__LANGUAGE=fr
  #     "fr" force le décodeur en mode français. La Darija partage ~40% de
  #     son vocabulaire avec le français (chiffres, verbes courants, termes
  #     techniques). Ce forçage améliore significativement la qualité sur les
  #     phrases mixtes Darija/français courantes dans l'application.
  #     Alternative : "ar" pour les utilisateurs qui parlent uniquement arabe.
  #
  # FIX v10 — WHISPER__MAX_CONCURRENT_REQUESTS=1
  #
  #   PROBLÈME :
  #     Sans limite de concurrence, deux requêtes audio simultanées chargent
  #     deux instances du modèle dans le même processus, doublant la mémoire
  #     peak et déclenchant l'OOM avant même que le leak n'entre en jeu.
  #
  #   FIX : MAX_CONCURRENT_REQUESTS=1
  #     Sérialise les transcriptions. File d'attente côté faster-whisper-server.
  #     La latence utilisateur est légèrement augmentée sous charge, mais
  #     l'OOM crash est éliminé.
  # ─────────────────────────────────────────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:                    "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE:         "cpu"
      WHISPER__COMPUTE_TYPE:             "int8"
      WHISPER__LANGUAGE:                 "fr"   # FIX v10 : améliore Darija algérienne
      WHISPER__BEAM_SIZE:                "1"
      WHISPER__MAX_CONCURRENT_REQUESTS:  "1"    # FIX v10 : prévient double-load OOM
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       2g     # FIX v10 : 1200m → 2g (ctranslate2 leak headroom)
    mem_reservation: 512m   # FIX v10 : 300m → 512m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     20s
      timeout:      10s
      retries:      10
      start_period: 300s

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
