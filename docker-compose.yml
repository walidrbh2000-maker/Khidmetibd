name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# FIXES v3 (gemma4:e2b + 8 GB RAM) :
#
#   ✅ Ollama : ollama/ollama:latest forcé via `make start` (pull systématique)
#              gemma3:4b nécessite Ollama >= v0.6 — le pull garantit la version
#
#   ✅ API → Ollama : dépendance relaxée à service_started
#              AVANT : service_healthy → cascade failure si Ollama rate son HC
#              APRÈS : service_started → l'API démarre, retry côté NestJS
#
#   ✅ Ollama healthcheck : start_period 15s → 90s
#              GitHub Codespaces a un I/O lent au démarrage.
#
#   ✅ DNS explicite sur le container Ollama (8.8.8.8 / 1.1.1.1)
#              Corrige "pull model manifest: file does not exist"
#
#   ✅ OLLAMA_NUM_CTX=4096
#              Limite le KV cache à ~200 MB pour respecter le budget RAM.
#
# FIXES v4 (Codespace 4-core 16 GB RAM / 32 GB disque) :
#
#   ✅ MinIO mem_limit : 192m → 512m
#              MinIO RELEASE.2025 requiert 512 MB minimum.
#              192m et 256m provoquent exit code 137 (OOM kill).
#
#   ✅ Modèle : gemma4:e2b → gemma3:4b
#              gemma4:e2b = 7.2 GB → trop grand pour Codespace 32 GB.
#              Docker images (~20-24 GB) + 7.2 GB = dépassement disque garanti.
#              gemma3:4b = 3.3 GB → laisse 5-9 GB libres ✅
#              Fonctionnalités conservées : texte + image, 140+ langues, 128K ctx.
#              Fonctionnalités perdues : audio (non utilisé — Whisper prend en charge).
#
# FIXES v5 :
#
#   ✅ API mem_limit : 512m → 1g
#              NestJS + Socket.io + Firebase Admin + ts-node (seeds) consomment
#              ~600-700 MB en développement. 512m était insuffisant et provoquait
#              "FATAL ERROR: Ineffective mark-compacts near heap limit".
#
#   ✅ NODE_OPTIONS : --max-old-space-size=400 → --max-old-space-size=768
#              Limite V8 old-space portée à 768 MB.
#              Raison : docker exec ts-node (seeds) tourne dans le même
#              container et hérite de NODE_OPTIONS. À 400 MB, le compilateur
#              TypeScript est OOM-killed silencieusement → seed FAILED.
#              768 MB laisse ~256 MB d'overhead V8 sous la mem_limit de 1g.
#
# BUDGET MÉMOIRE 16 GB RAM (Codespace 4-core) :
#   Ollama + gemma3:4b    ~4.0 GB  (modèle 3.3 GB + runtime 0.7 GB)
#   faster-whisper-small  ~0.7 GB
#   NestJS API            ~0.8 GB  (↑ depuis 0.5 GB)
#   MongoDB               ~0.4 GB
#   Redis                 ~0.2 GB
#   Qdrant                ~0.2 GB
#   MinIO                 ~0.5 GB
#   nginx + mongo-express ~0.3 GB
#   ─────────────────────────────
#   Conteneurs total      ~7.1 GB
#   OS + Docker daemon    ~1.5 GB
#   ─────────────────────────────
#   TOTAL                 ~8.6 GB  ✅ (marge 7.4 GB sur 16 GB)
#
# WORKFLOW :
#   1ère fois      → make start  (pull image Ollama latest + modèle gemma3:4b)
#   Fois suivantes → make start  (modèle en volume → secondes)
#   Changer modèle → modifier OLLAMA_MODEL dans .env + make ollama-pull
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  #
  # FIX v5 :
  #   mem_limit : 512m → 1g
  #   NODE_OPTIONS : --max-old-space-size=400 → --max-old-space-size=768
  #
  #   POURQUOI 768 MB pour V8 :
  #     V8 réserve de l'espace heap au-delà du old-space (code space, map space,
  #     large object space, etc.). Une règle empirique : laisser ~25% d'overhead
  #     entre max-old-space-size et mem_limit.
  #     1024 MB * 0.75 = 768 MB → overhead 256 MB → pas d'OOM container.
  #
  #   POURQUOI ts-node seeds échouaient :
  #     `docker exec khidmeti-api npx ts-node ...` crée un nouveau processus Node
  #     dans le même container. Il hérite de NODE_OPTIONS du container.
  #     À 400 MB, le compilateur TypeScript (tsc en mémoire) dépasse la limite
  #     et est tué silencieusement → exit code 1 → "seed FAILED".
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy  }
      redis:   { condition: service_healthy  }
      qdrant:  { condition: service_healthy  }
      minio:   { condition: service_healthy  }
      ollama:  { condition: service_started  }
      whisper: { condition: service_started  }
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama — LLM local (gemma3:4b) ──────────────────────────────────────────
  #
  # IMAGE : ollama/ollama:latest
  #   `make start` force `docker compose pull ollama` → garantit Ollama >= 0.6
  #   requis pour gemma3:4b (multimodal engine).
  #
  # MODÈLE : gemma3:4b (3.3 GB disque, ~3.5 GB RAM)
  #   Texte + Image, 128K context, 140+ langues incluant arabe/darija/français.
  #   Analyse de photos de sinistres (fuite, désordre, prise brûlée, etc.).
  #   Audio : géré par faster-whisper séparément → pas besoin dans Ollama.
  #
  # DNS : 8.8.8.8 / 1.1.1.1
  #   Corrige les échecs de résolution DNS vers registry.ollama.ai sur Codespaces.
  #
  # OLLAMA_NUM_CTX=4096
  #   KV cache ~200 MB → total ~6.2 GB sur 16 GB ✅
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"          # CPU : 1 seule inférence à la fois
      OLLAMA_MAX_LOADED_MODELS: "1"          # 1 modèle en RAM (économie mémoire)
      OLLAMA_KEEP_ALIVE:        "-1"         # Modèle permanent en RAM (zéro cold start)
      OLLAMA_NUM_THREAD:        "4"          # Threads CPU (4-core Codespace)
      OLLAMA_FLASH_ATTENTION:   "0"          # Désactivé sur CPU (GPU seulement)
      OLLAMA_NUM_CTX:           "4096"       # KV cache ~200 MB — suffisant pour Khidmeti
      OLLAMA_MAX_QUEUE:         "2"          # File d'attente limitée (évite OOM si rafale)
      OLLAMA_ORIGINS:           "*"          # Accepte les connexions Docker inter-services
    ports:
      - '11434:11434'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - khidmeti-network
    mem_limit:       4g                      # gemma3:4b ~3.3 GB + runtime ~0.7 GB
    mem_reservation: 500m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     15s
      timeout:      5s
      retries:      8
      start_period: 90s

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cpu"
      WHISPER__COMPUTE_TYPE:     "int8"
      WHISPER__LANGUAGE:         "auto"
      WHISPER__BEAM_SIZE:        "1"
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       700m
    mem_reservation: 100m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     20s
      timeout:      10s
      retries:      10
      start_period: 300s

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       200m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  #
  # mem_limit=512m (FIX v4, était 192m)
  #   MinIO RELEASE.2025+ requiert un minimum de 512 MB pour fonctionner.
  #   192m et 256m provoquaient exit code 137 (OOM kill) au démarrage.
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       512m   # FIX v4 : 192m → 512m (MinIO 2025 minimum confirmé)
    mem_reservation: 128m   # FIX v4 : 64m → 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
