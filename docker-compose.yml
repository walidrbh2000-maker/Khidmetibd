name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale — Architecture directe)
#
# MIGRATION v11 — llama.cpp:server direct (sans Ollama)
#
# POURQUOI supprimer Ollama ?
#   Problème observé dans les logs (screenshots 8-10) :
#     "llama runner process has terminated: %w(<nil>)"
#     "AI overloaded/unavailable [image]: Ollama 500"
#   CAUSE : Ollama est un wrapper Go autour de llama.cpp. Il ajoute :
#     - Une couche HTTP Go (~100 MB RAM overhead)
#     - Un gestionnaire de "runners" instable sur CPU limité
#     - Un swap automatique entre modèles qui cause des OOM sur 8 GB
#   SOLUTION : utiliser llama.cpp:server directement
#     → Même binaire C++ qu'Ollama utilise en interne
#     → Zéro overhead Go
#     → Démarrage en <8s (modèle déjà sur disque)
#     → API OpenAI-compatible identique
#
# ARCHITECTURE :
#
#   ┌──────────────────────────────────────────────────────────┐
#   │  docker/models/           ← bind mount (dossier local)  │
#   │  ├── text/                                               │
#   │  │   └── qwen3-0.6b-q4_k_m.gguf   (~500 MB)            │
#   │  ├── audio/                                              │
#   │  │   └── [téléchargé au 1er start] (~800 MB)            │
#   │  └── vision/              ← optionnel                   │
#   │      ├── moondream2-text-Q8_0.gguf  (~1.7 GB)           │
#   │      └── moondream2-mmproj-f16.gguf (~100 MB)           │
#   └──────────────────────────────────────────────────────────┘
#
#   NestJS API
#     ├── ai-text:8011   → llama.cpp:server + Qwen3-0.6B  (JSON)
#     ├── ai-audio:8000  → faster-whisper + large-v3-turbo (STT)
#     └── ai-vision:8012 → llama.cpp:server + moondream2  (image, optionnel)
#
# BUDGET MÉMOIRE 8 GB RAM :
#   ai-text  (Qwen3 Q4_K_M)     : ≤  900 MB
#   ai-audio (large-v3-turbo)   : ≤ 2000 MB
#   api (NestJS)                 : ≤ 1024 MB
#   mongo                        : ≤  256 MB
#   redis                        : ≤  192 MB
#   qdrant                       : ≤  128 MB
#   minio                        : ≤  384 MB
#   nginx + mongo-express        : ≤  192 MB
#   ─────────────────────────────────────────
#   Total sans vision            : ≈ 5.1 GB  ✅ OK sur 8 GB
#   Total avec vision (2200m)    : ≈ 7.3 GB  ⚠️  Décommenter sur 10+ GB
#
# PREMIERS PAS :
#   chmod +x scripts/download-models.sh
#   ./scripts/download-models.sh
#   docker compose up -d
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:  { name: khidmeti-mongo-data  }
  redis-data:  { name: khidmeti-redis-data  }
  qdrant-data: { name: khidmeti-qdrant-data }
  minio-data:  { name: khidmeti-minio-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     development
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      minio:    { condition: service_healthy }
      ai-text:  { condition: service_healthy }
      ai-audio: { condition: service_started }
    networks:
      - khidmeti-network
    mem_limit:       1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-TEXT — llama.cpp:server + Qwen3-0.6B-Q4_K_M
  #
  # Image  : ghcr.io/ggml-org/llama.cpp:server (~200 MB compressed)
  # Modèle : ./docker/models/text/qwen3-0.6b-q4_k_m.gguf (~500 MB)
  # API    : OpenAI /v1/chat/completions
  # Port   : 8011
  #
  # POURQUOI Qwen3-0.6B et non gemma3:1b ?
  #   → 119 langues (Darija, Arabe, Français, Anglais, Russe...)
  #   → Mode non-thinking (/no_think) = JSON immédiat sans chain-of-thought
  #   → Q4_K_M = meilleur compromis taille/qualité pour CPU
  #   → Démarrage en ~3s (modèle déjà sur disque, pas de téléchargement)
  #
  # POURQUOI pas Ollama ?
  #   → Ollama wrappait llama.cpp dans Go → 100 MB RAM overhead inutile
  #   → Crash "llama runner process has terminated" sur CPU limité
  #   → Ce container = le même engine SANS le wrapper instable
  # ════════════════════════════════════════════════════════════════════════════
  ai-text:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: khidmeti-ai-text
    restart: unless-stopped
    volumes:
      - ./docker/models/text:/models:ro
    environment:
      LLAMA_ARG_MODEL:         /models/qwen3-0.6b-q4_k_m.gguf
      LLAMA_ARG_PORT:          "8011"
      LLAMA_ARG_HOST:          "0.0.0.0"
      LLAMA_ARG_CTX_SIZE:      "512"     # system prompt + query + JSON = ~400 tokens
      LLAMA_ARG_N_PREDICT:     "200"     # JSON court, 200 tokens suffisent
      LLAMA_ARG_THREADS:       "4"
      LLAMA_ARG_PARALLEL:      "2"       # 2 requêtes simultanées max
      LLAMA_ARG_CONT_BATCHING: "true"
    ports:
      - "8011:8011"
    networks:
      - khidmeti-network
    mem_limit:       900m
    mem_reservation: 600m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval:     15s
      timeout:      5s
      retries:      5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-AUDIO — faster-whisper-server + large-v3-turbo INT8
  #
  # Image  : fedirz/faster-whisper-server:latest-cpu (~400 MB)
  # Modèle : Systran/faster-whisper-large-v3-turbo (~800 MB, INT8)
  #          → téléchargé automatiquement dans docker/models/audio/ au 1er start
  # API    : OpenAI /v1/audio/transcriptions
  # Port   : 8000
  #
  # POURQUOI large-v3-turbo et pas whisper-small ?
  #   Screenshots montrent "Chosnip lombé" au lieu de transcription correcte
  #   → small WER Darija : ~25% (1 mot sur 4 incorrect)
  #   → turbo WER Darija : ~8%  (beaucoup mieux sur dialecte algérien)
  #   → turbo INT8 RAM   :  1.2 GB (acceptable, vs 600 MB small)
  #
  # FIX OOM (1200m → 2g) :
  #   ctranslate2 memory leak connu → pic mémoire après plusieurs requêtes
  #   2g = 800 MB modèle + 800 MB ctranslate2 peak + 400 MB marge
  #
  # WHISPER__LANGUAGE=fr :
  #   La Darija algérienne partage ~40% vocabulaire avec le français
  #   → forcer "fr" améliore significativement la reconnaissance
  # ════════════════════════════════════════════════════════════════════════════
  ai-audio:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-ai-audio
    restart: unless-stopped
    volumes:
      - ./docker/models/audio:/root/.cache/huggingface:rw
    environment:
      WHISPER__MODEL:                   "${WHISPER_MODEL:-Systran/faster-whisper-large-v3-turbo}"
      WHISPER__INFERENCE_DEVICE:        "cpu"
      WHISPER__COMPUTE_TYPE:            "int8"
      WHISPER__LANGUAGE:                "fr"
      WHISPER__BEAM_SIZE:               "1"
      WHISPER__MAX_CONCURRENT_REQUESTS: "1"
    ports:
      - "8000:8000"
    networks:
      - khidmeti-network
    mem_limit:       2g
    mem_reservation: 800m
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval:     20s
      timeout:      10s
      retries:      5
      start_period: 300s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════════════════════════════════
  # AI-VISION — llama.cpp:server + moondream2 (OPTIONNEL)
  #
  # Image  : ghcr.io/ggml-org/llama.cpp:server (même image que ai-text)
  # Modèles: moondream2-20250414 en GGUF (2 fichiers, ~1.8 GB total)
  # API    : OpenAI /v1/chat/completions (avec support images base64)
  # Port   : 8012
  #
  # PRÉREQUIS :
  #   1. Exécuter : ./scripts/download-models.sh (répondre Y à la question vision)
  #   2. Décommenter ce service
  #   3. Décommenter "ai-vision" dans depends_on du service api ci-dessus
  #   4. RAM recommandée : 10+ GB
  #
  # POURQUOI deux fichiers GGUF ?
  #   moondream2-text-Q8_0.gguf   : le LLM (génération de texte)
  #   moondream2-mmproj-f16.gguf  : le projecteur CLIP (encodage visuel)
  #   → llama.cpp charge les deux via --model + --mmproj
  #
  # PIPELINE TWO-STEP (conservé depuis v10) :
  #   Step 1 : moondream2 décrit l'image en anglais (1 phrase)
  #            → ce pour quoi moondream est conçu (description, pas JSON)
  #   Step 2 : Qwen3 (ai-text) extrait le JSON d'intent depuis la description
  #            → JSON fiable, moondream ne suit jamais les instructions JSON
  # ════════════════════════════════════════════════════════════════════════════
  # ai-vision:
  #   image: ghcr.io/ggml-org/llama.cpp:server
  #   container_name: khidmeti-ai-vision
  #   restart: unless-stopped
  #   volumes:
  #     - ./docker/models/vision:/models:ro
  #   environment:
  #     LLAMA_ARG_MODEL:     /models/moondream2-text-Q8_0.gguf
  #     LLAMA_ARG_MMPROJ:    /models/moondream2-mmproj-f16.gguf
  #     LLAMA_ARG_PORT:      "8012"
  #     LLAMA_ARG_HOST:      "0.0.0.0"
  #     LLAMA_ARG_CTX_SIZE:  "1024"
  #     LLAMA_ARG_N_PREDICT: "100"
  #     LLAMA_ARG_THREADS:   "4"
  #   ports:
  #     - "8012:8012"
  #   networks:
  #     - khidmeti-network
  #   mem_limit:       2200m
  #   mem_reservation: 1500m
  #   healthcheck:
  #     test:         ["CMD", "curl", "-sf", "http://localhost:8012/health"]
  #     interval:     20s
  #     timeout:      10s
  #     retries:      3
  #     start_period: 15s
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "5m"
  #       max-file: "2"

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ────────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ───────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
