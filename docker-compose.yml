name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — Docker Compose (stack CPU, IA 100% locale)
#
# FIXES v3 (gemma4:e2b + 8 GB RAM) :
#
#   ✅ Ollama : ollama/ollama:latest forcé via `make start` (pull systématique)
#              gemma4 nécessite Ollama >= v0.20.0 — le pull garantit la version
#
#   ✅ API → Ollama : dépendance relaxée à service_started
#              AVANT : service_healthy → cascade failure si Ollama rate son HC
#              APRÈS : service_started → l'API démarre, retry côté NestJS
#
#   ✅ Ollama healthcheck : start_period 15s → 90s
#              GitHub Codespaces a un I/O lent au démarrage.
#              15s était insuffisant, causant le status "Error" en Image 2.
#
#   ✅ DNS explicite sur le container Ollama (8.8.8.8 / 1.1.1.1)
#              Corrige "pull model manifest: file does not exist"
#              causé par un échec de résolution DNS dans certains réseaux VPN.
#
#   ✅ OLLAMA_NUM_CTX=4096
#              gemma4:e2b supporte 128K mais le KV cache plein = ~12 GB RAM
#              4096 ctx → KV cache ~200 MB → budget RAM respecté sur 8 GB
#
#   ✅ Limites mémoire ajustées pour 8 GB RAM avec gemma4:e2b (~3.5 GB chargé)
#
# FIXES v4 (16 GB RAM — Codespace 4-core) :
#
#   ✅ MinIO mem_limit : 192m → 512m
#              MinIO RELEASE.2025 requiert 512 MB minimum.
#              192m provoquait exit code 137 (OOM kill) au démarrage.
#              Confirmé : 256m = crash console, 512m = stable.
#
#   ✅ Ollama mem_limit : 4g → 8g
#              gemma4:e2b = 7.2 GB sur disque → ~6-7 GB RAM chargé (Q4_K_M).
#              4g bloquait le chargement du modèle en mémoire.
#              Sur 16 GB RAM : 8g est la limite correcte.
#
#   ✅ OLLAMA_NUM_CTX : 4096 → 8192
#              Calculé pour 8 GB (modèle 3.5 GB supposé, maintenant 7 GB réel).
#              Sur 16 GB : modèle ~7 GB + services ~2.5 GB + KV 8192 ~400 MB
#              = ~10 GB / 16 GB ✅  — meilleure qualité de raisonnement.
#
# BUDGET MÉMOIRE 16 GB RAM (Codespace 4-core) :
#   Ollama + gemma4:e2b   ~8.0 GB  (modèle 7.2 GB + runtime 0.8 GB)
#   faster-whisper-small  ~0.7 GB
#   NestJS API            ~0.5 GB
#   MongoDB               ~0.4 GB
#   Redis                 ~0.2 GB
#   Qdrant                ~0.2 GB
#   MinIO                 ~0.5 GB
#   nginx + mongo-express ~0.3 GB
#   ─────────────────────────────
#   Conteneurs total      ~10.8 GB
#   OS + Docker daemon    ~1.5 GB
#   ─────────────────────────────
#   TOTAL                 ~12.3 GB  ✅ (marge 3.7 GB sur 16 GB)
#
# WORKFLOW :
#   1ère fois      → make start  (pull image Ollama latest + modèle gemma4:e2b)
#   Fois suivantes → make start  (modèle en volume → secondes)
#   Changer modèle → modifier OLLAMA_MODEL dans .env + make ollama-pull
# ══════════════════════════════════════════════════════════════════════════════

networks:
  khidmeti-network:
    driver: bridge
    name: khidmeti-network

volumes:
  mongo-data:   { name: khidmeti-mongo-data   }
  redis-data:   { name: khidmeti-redis-data   }
  qdrant-data:  { name: khidmeti-qdrant-data  }
  minio-data:   { name: khidmeti-minio-data   }
  whisper-data: { name: khidmeti-whisper-data }
  ollama-data:  { name: khidmeti-ollama-data  }

services:

  # ── NestJS API ──────────────────────────────────────────────────────────────
  #
  # FIX v3 : ollama → service_started (était service_healthy)
  #
  # POURQUOI :
  #   - service_healthy exige qu'Ollama passe son healthcheck AVANT de démarrer
  #     l'API. Sur GitHub Codespaces, Ollama peut mettre 60-90s à démarrer.
  #   - Si le healthcheck échoue (start_period dépassé), l'API ne démarre pas
  #     et tout le stack est marqué en erreur (comportement vu en Image 2).
  #   - service_started : l'API démarre dès qu'Ollama est lancé (pas forcément
  #     prêt). NestJS gère les retry côté code pour les appels Ollama.
  #   - Whisper reste service_started (déjà correct).
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     development
      args:
        NODE_VERSION: "20.19-alpine3.21"
    container_name: khidmeti-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:    development
      NODE_OPTIONS: "--max-old-space-size=400"
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src:ro
    depends_on:
      mongo:   { condition: service_healthy  }
      redis:   { condition: service_healthy  }
      qdrant:  { condition: service_healthy  }
      minio:   { condition: service_healthy  }
      ollama:  { condition: service_started  }   # FIX v3 : service_healthy → service_started
      whisper: { condition: service_started  }
    networks:
      - khidmeti-network
    mem_limit:       512m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama — LLM local (gemma4:e2b) ─────────────────────────────────────────
  #
  # IMAGE : ollama/ollama:latest
  #   IMPORTANT : `make start` force `docker compose pull ollama` avant up.
  #   Cela garantit Ollama >= v0.20.0 qui est requis pour gemma4.
  #   Sans ce pull, une image cachée ancienne (ex: v0.6.5) serait utilisée
  #   et le pull de gemma4 échouerait avec "requires a newer version".
  #
  # DNS : 8.8.8.8 / 1.1.1.1 (FIX v3)
  #   Docker utilise par défaut le DNS de l'hôte. Sur GitHub Codespaces avec
  #   VPN actif, la résolution de registry.ollama.ai peut échouer depuis le
  #   conteneur, causant "pull model manifest: file does not exist" même pour
  #   des modèles existants (gemma3:2b, etc.).
  #   DNS explicites Google + Cloudflare contournent ce problème.
  #
  # OLLAMA_NUM_CTX=8192 (FIX v4, était 4096)
  #   Sur 16 GB RAM : modèle ~7 GB + services ~2.5 GB + KV 8192 ~400 MB = ~10 GB ✅
  #   4096 était calculé pour 8 GB avec un modèle supposé 3.5 GB (incorrect).
  #   128K ctx natif = KV cache ~12 GB → toujours trop pour 16 GB avec services.
  #
  # mem_limit=8g (FIX v4, était 4g)
  #   gemma4:e2b = 7.2 GB sur disque (Q4_K_M multimodal avec PLE).
  #   RAM chargée : ~6-7 GB. La limite de 4g empêchait le chargement du modèle.
  #
  # HEALTHCHECK : start_period 90s (FIX v3)
  #   15s insuffisant sur Codespaces (I/O lent, premier démarrage long).
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: khidmeti-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL:      "1"          # CPU : 1 seule inférence à la fois
      OLLAMA_MAX_LOADED_MODELS: "1"          # 1 modèle en RAM (économie mémoire)
      OLLAMA_KEEP_ALIVE:        "-1"         # Modèle permanent en RAM (zéro cold start)
      OLLAMA_NUM_THREAD:        "4"          # Threads CPU (4-core Codespace)
      OLLAMA_FLASH_ATTENTION:   "0"          # Désactivé sur CPU (GPU seulement)
      OLLAMA_NUM_CTX:           "8192"       # FIX v4 : 4096 → 8192 (KV ~400 MB sur 16 GB)
      OLLAMA_MAX_QUEUE:         "2"          # File d'attente limitée (évite OOM si rafale)
      OLLAMA_ORIGINS:           "*"          # Accepte les connexions Docker inter-services
    ports:
      - '11434:11434'
    dns:                                     # FIX v3 : DNS explicites pour registry.ollama.ai
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - khidmeti-network
    mem_limit:       8g                      # FIX v4 : 4g → 8g (gemma4:e2b ~7 GB RAM chargé)
    mem_reservation: 1g                      # FIX v4 : 500m → 1g
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:11434/']
      interval:     15s
      timeout:      5s
      retries:      8
      start_period: 90s   # FIX v3 : 15s → 90s (Codespaces I/O lent au démarrage)

  # ── faster-whisper — Transcription audio locale ─────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: khidmeti-whisper
    restart: unless-stopped
    volumes:
      - whisper-data:/root/.cache/huggingface
    environment:
      WHISPER__MODEL:            "${WHISPER_MODEL:-Systran/faster-whisper-small}"
      WHISPER__INFERENCE_DEVICE: "cpu"
      WHISPER__COMPUTE_TYPE:     "int8"
      WHISPER__LANGUAGE:         "auto"
      WHISPER__BEAM_SIZE:        "1"
    ports:
      - '8000:8000'
    networks:
      - khidmeti-network
    mem_limit:       700m
    mem_reservation: 100m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval:     20s
      timeout:      10s
      retries:      10
      start_period: 300s   # 1er démarrage : download HuggingFace ~466 MB

  # ── MongoDB 7.0 ─────────────────────────────────────────────────────────────
  mongo:
    image:          mongo:7.0.16
    container_name: khidmeti-mongo
    restart:        unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      khidmeti
    volumes:
      - mongo-data:/data/db
    networks:
      - khidmeti-network
    mem_limit:       384m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:         ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Mongo Express ────────────────────────────────────────────────────────────
  mongo-express:
    image:          mongo-express:1.0.2
    container_name: khidmeti-mongo-ui
    restart:        unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH:             "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
    depends_on:
      mongo: { condition: service_healthy }
    networks:
      - khidmeti-network
    mem_limit:       200m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image:          redis:7.2.7-alpine
    container_name: khidmeti-redis
    restart:        unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval:    10s
      timeout:     3s
      retries:     5
      start_period: 5s

  # ── Qdrant v1.9 ─────────────────────────────────────────────────────────────
  qdrant:
    image:          qdrant/qdrant:v1.9.0
    container_name: khidmeti-qdrant
    restart:        unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - khidmeti-network
    mem_limit:       192m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null && exit 0 || exit 1
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  #
  # mem_limit=512m (FIX v4, était 192m)
  #   MinIO RELEASE.2025+ requiert un minimum de 512 MB pour fonctionner.
  #   192m et 256m provoquent un exit code 137 (OOM kill) lors de l'init
  #   ou à la première utilisation de la console web.
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image:          minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: khidmeti-minio
    restart:        unless-stopped
    command:        server /data --address ":9001" --console-address ":9002"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9001:9001'
      - '9002:9002'
    networks:
      - khidmeti-network
    mem_limit:       512m   # FIX v4 : 192m → 512m (MinIO 2025 minimum confirmé)
    mem_reservation: 128m   # FIX v4 : 64m → 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test:         ['CMD', 'curl', '-f', 'http://localhost:9001/minio/health/live']
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio-init:
    image:          minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: khidmeti-minio-init
    restart:        "no"
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - khidmeti-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9001 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/profile-images;
        mc mb --ignore-existing local/service-media;
        mc mb --ignore-existing local/audio-recordings;
        mc anonymous set download local/profile-images;
        echo '✅ Buckets prêts.';
      "

  # ── nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image:          nginx:1.27.4-alpine
    container_name: khidmeti-nginx
    restart:        unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - khidmeti-network
    mem_limit:       64m
    mem_reservation: 16m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
